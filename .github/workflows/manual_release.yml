# This is a basic workflow that is manually triggered

name: Manual Maven Release

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      comment:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Comment for release'
        # Default value if no value is explicitly provided
        default: 'Start release from WEB UI'
        # Input has to be provided for the workflow to run
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check-actor:
    name: Check actor is a member of the release team
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.membership.outputs.allowed }}
    steps:
      - name: Check team membership
        id: membership
        env:
          GITHUB_TOKEN: '${{ secrets.GH_TOKEN_TECHUSER_JAVA }}'
          ORG: 'i-Cell-Mobilsoft-Open-Source'
          # Use the slug of the team whose members are allowed to release.
          # Find your team slug at: https://github.com/orgs/i-Cell-Mobilsoft-Open-Source/teams
          # For a nested team (e.g. java > coffee-releases), the slug is still just 'coffee-releases'.
          TEAM_SLUG: 'coffee-releases'
          ACTOR: '${{ github.actor }}'
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${ORG}/teams/${TEAM_SLUG}/memberships/${ACTOR}")
          if [ "$status" = "200" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Actor '${ACTOR}' is not a member of the '${ORG}/${TEAM_SLUG}' team (HTTP ${status})."
          fi

  mvn-release:
    needs: check-actor
    runs-on: ubuntu-latest
    if: needs.check-actor.outputs.allowed == 'true'

    steps:
      - name: Release
        uses: speter555/gh-action-mvn-release-main@v0.32.0
        with:
          GITHUB_TOKEN: '${{ secrets.GH_TOKEN_TECHUSER_JAVA }}'
          ARTIFACT_STORE_SERVER_ID: 'central'
          SETTINGS_XML_PATH: '.github/.m2/settings.xml'
          GPG_KEY_ID_GITHUB_TECHUSER: '${{ secrets.GPG_KEY_ID_GITHUB_TECHUSER }}'
          GPG_SIGNING_KEY_GITHUB_TECHUSER: '${{ secrets.GPG_SIGNING_KEY_GITHUB_TECHUSER }}'
          SSH_PRIVATE_KEY_GITHUB_TECHUSER: '${{ secrets.SSH_PRIVATE_KEY_GITHUB_TECHUSER }}'
          TECH_USER_USERNAME: 'icellmobilsoft-robot'
          TECH_USER_EMAIL: 'github_techuser@icellmobilsoft.hu'
          NEXUS_USER: '${{ secrets.CENTRAL_SONATYPE_ORG_USER }}'
          NEXUS_PASSWORD: '${{ secrets.CENTRAL_SONATYPE_ORG_PASSWORD }}'
          JAVA_VERSION: '17'
          JAVA_DISTRIBUTION: 'temurin'
